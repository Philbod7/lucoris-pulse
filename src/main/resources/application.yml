spring:
  application:
    name: lucoris-pulse
  # Virtual Threads (Java 21) global aktivieren.
  threads:
    virtual:
      enabled: true
  # Flyway besitzt das Schema; Hibernate validiert nur.
  flyway:
    enabled: true
  jpa:
    hibernate:
      # Nie create/update — Flyway ist die alleinige Quelle des Schemas.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          # Firehose-Massen-Insert (StatelessSession): JDBC-Batching aktiv halten.
          batch_size: 500
        id:
          optimizer:
            # Pooled-lo passt zu Sequenzen START WITH 1 / INCREMENT 50 (= allocationSize 50).
            pooled:
              preferred: pooled-lo
  # Datasource NICHT im Repo: Laufzeit über Umgebungsvariablen (SPRING_DATASOURCE_*),
  # Tests liefern die DB per Testcontainers @ServiceConnection.

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        # Liveness/Readiness immer aktiv (nicht nur in Kubernetes).
        enabled: true
      group:
        readiness:
          # Readiness inkl. DB-Check.
          include: readinessState,db

# Ingest-Konfiguration (gdelt: nur unter Profil `ingest`; primary: unter `ingest` ODER `validate-sources`).
lucoris:
  ingest:
    # Primärquellen (RSS/Atom der Notenbanken, Statistikämter, ...). Welche Quellen abgerufen
    # werden, steht NICHT hier, sondern im Routing-Manifest — hier nur das Wie des Abrufs.
    primary:
      # Ehrlicher Bot-User-Agent mit Kontaktseite. KEIN Spoofing (docs/ingest-and-sources.md).
      user-agent: "LucorisBot/0.1 (+https://www.lucoris.com/bot)"
      connect-timeout: 10s
      request-timeout: 30s
      # Routing-Manifest: id, handler, access.url, enabled, legal_class, attribution je Quelle.
      manifest: "primary-sources/lucoris-pulse-primary-sources.json"

    gdelt:
      # Diagnose: am Ende eines Tageslaufs ALLE vorgekommenen GKG-Themen-Codes mit Häufigkeit
      # und Marktrelevanz-Markierung loggen (hilft, das Set oben zu kuratieren). Später abschaltbar.
      log-theme-histogram: true
      # Events/Mentions an die marktrelevanten Artikel koppeln: pro Slice nur behalten, was zu einem
      # behaltenen GKG-Artikel gehört (Mention über URL, Event über global_event_id einer behaltenen
      # Mention). Hält nicht-relevante Daten raus (Intra-Slice-Näherung). false = ungefiltert.
      filter-linked-events-and-mentions: true
      # Event-Backfill: Leseversuche je älterem Export-Slice, bevor ein Stub-Event angelegt wird.
      event-backfill-retries: 3

      # Marktrelevanz-Filter: Ein GKG-Artikel wird nur gespeichert, wenn mindestens eine seiner
      # GKG-Themen mit einem dieser Präfixe beginnt (Wirtschaft/Politik). Alles andere wird VOR
      # dem Schreiben verworfen — hält die DB-Menge klein. Einträge wirken als Präfix (ECON_ =
      # ganze Familie). Weitere Kandidaten bei Bedarf ergänzen, z.B.: WB_ (Weltbank-Themen),
      # TAX_FNCACT_* / TAX_ECON_*, LEGISLATION, ELECTION, TRIAL, CORRUPTION, SANCTIONS.
      market-relevant-theme-prefixes:
      # --- Wirtschaft / Finanzmärkte (sicher) ---
      - ECON_STOCKMARKET
      - ECON_INTEREST_RATE
      - ECON_INFLATION
      - ECON_CENTRALBANK
      - ECON_BANKRUPTCY
      - ECON_DEBT
      - ECON_CURRENCY_EXCHANGE_RATE
      - ECON_CURRENCY_RESERVES
      - ECON_TAXATION
      - ECON_SUBSIDIES
      - ECON_MONOPOLY
      - ECON_FREETRADE
      - ECON_TRADE_DISPUTE
      - ECON_NATIONALIZE
      - ECON_PRICECONTROL
      - ECON_BOYCOTT

      # --- Geld-/Fiskalpolitik: schmale EPU-Unterkategorien statt EPU_POLICY ---
      - EPU_ECONOMY
      - EPU_ECONOMY_HISTORIC
      - EPU_CATS_MONETARY_POLICY
      - EPU_CATS_FISCAL_POLICY
      - EPU_CATS_TAXES
      - EPU_CATS_REGULATION
      - EPU_CATS_TRADE_POLICY
      - EPU_CATS_NATIONAL_SECURITY
